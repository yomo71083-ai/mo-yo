<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
background:#020617;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>

</head>

<body>

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">تسجيل الدخول</button>
<button onclick="register()">إنشاء حساب</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyC2Goh5PEdW5WK3FkosvBMY6S5FZpTuayY",
authDomain: "code-master-eea4a.firebaseapp.com",
projectId: "code-master-eea4a",
storageBucket: "code-master-eea4a.firebasestorage.app",
messagingSenderId: "1095909704694",
appId: "1:1095909704694:web:3473e2a4c1eb5261f63dd7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("تم إنشاء الحساب");
})
.catch(e=>alert(e.message));

}

window.login = function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("تم تسجيل الدخول");
window.location.href="index.html";
})
.catch(e=>alert(e.message));

}

</script>

</body>
</html>
